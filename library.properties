sentence=Play WAV files from SD card through a MAX98357 I2S amplifier on HUB8735 Ultra (RTL8735B).
paragraph=Uses the RTL8735B low-level mbed i2s_api (I2S0 fixed pin group PF_13/PF_15/PF_14) to drive a MAX98357. Supports 16-bit PCM WAV, mono or stereo, common sample rates. Wiring: BCLK=D24, LRC=D12, DIN=D11.
